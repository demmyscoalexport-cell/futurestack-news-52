kind = "web"
previewPath = "/"
title = "DISCOVA"
version = "1.0.0"

[[services]]
localPort = 3000
name = "FutureStack Dev"
paths = ["/"]

[services.env]
PORT = "3000"

[services.development]
run = "cd /home/runner/workspace/futurestack && npm run dev"

[services.production]

[services.production.build]
args = ["bash", "-c", "cd /home/runner/workspace/futurestack && npm run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace/futurestack && npm run start"]

[services.production.run.env]
PORT = "3000"
NODE_ENV = "production"
