name: Copy Vercel env (discova → futurestack)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List variables only; do not write to target project"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  copy-env:
    name: Copy env vars to futurestack-news-52
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy environment variables
        working-directory: futurestack
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_SOURCE_PROJECT: discova-ai-platform
          VERCEL_TARGET_PROJECT: futurestack-news-52
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is not configured. Add it in GitHub → Settings → Secrets."
            exit 1
          fi
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          node scripts/copy-vercel-env.mjs $ARGS
